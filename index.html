<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#635BFF">
<title>When did I last…?</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;

    --accent: #635BFF;
    --accent-soft: #ECEBFF;
    --accent-press: #5249e0;

    --fresh: #15B79E;
    --due:   #F59E0B;
    --over:  #DF1B41;

    --bg: #F6F8FB;
    --surface: #FFFFFF;
    --surface-2: #F2F4F8;
    --text: #0A2540;
    --text-2: #647590;
    --text-3: #8A99B0;
    --border: #E6EAF0;
    --shadow: 0 1px 2px rgba(10,37,64,.06), 0 4px 16px rgba(10,37,64,.06);
    --shadow-lg: 0 8px 30px rgba(10,37,64,.16);
  }
  [data-theme="dark"] {
    --accent: #8B83FF;
    --accent-soft: #23203B;
    --accent-press: #9d96ff;

    --fresh: #2DD4BF;
    --due:   #FBBF24;
    --over:  #FF6B7E;

    --bg: #0B0D14;
    --surface: #14171F;
    --surface-2: #1B1F2A;
    --text: #EDF0F5;
    --text-2: #9AA6B8;
    --text-3: #6B7689;
    --border: #242937;
    --shadow: 0 1px 2px rgba(0,0,0,.4), 0 4px 16px rgba(0,0,0,.3);
    --shadow-lg: 0 8px 30px rgba(0,0,0,.5);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    font-family: var(--font); background: var(--bg); color: var(--text); line-height: 1.4;
    -webkit-font-smoothing: antialiased; transition: background .25s ease, color .25s ease;
    padding-bottom: env(safe-area-inset-bottom);
  }
  .tnum { font-variant-numeric: tabular-nums; }

  /* Header */
  header {
    position: sticky; top: 0; z-index: 40;
    background: color-mix(in srgb, var(--bg) 82%, transparent);
    backdrop-filter: saturate(160%) blur(14px); -webkit-backdrop-filter: saturate(160%) blur(14px);
    border-bottom: 1px solid var(--border); padding: calc(env(safe-area-inset-top) + 14px) 18px 12px;
  }
  .header-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; max-width: 640px; margin: 0 auto; }
  .title h1 { font-size: 20px; font-weight: 700; letter-spacing: -.02em; }
  .title span { font-size: 12.5px; color: var(--text-2); font-weight: 500; }
  .header-actions { display: flex; gap: 8px; }
  .icon-btn {
    width: 40px; height: 40px; flex: 0 0 40px; border: 1px solid var(--border); background: var(--surface);
    border-radius: 12px; cursor: pointer; display: grid; place-items: center; color: var(--text);
    transition: transform .12s, background .2s; }
  .icon-btn:active { transform: scale(.92); }
  .icon-btn svg { width: 19px; height: 19px; }

  main { max-width: 640px; margin: 0 auto; padding: 16px 16px 140px; }

  .filters { display: flex; gap: 8px; overflow-x: auto; padding: 2px 0 14px; scrollbar-width: none; }
  .filters::-webkit-scrollbar { display: none; }
  .pill {
    flex: 0 0 auto; padding: 7px 14px; border-radius: 999px; border: 1px solid var(--border);
    background: var(--surface); color: var(--text-2); font-size: 13px; font-weight: 600; cursor: pointer;
    white-space: nowrap; transition: all .18s; }
  .pill[data-active="true"] { background: var(--text); color: var(--bg); border-color: var(--text); }

  /* Cards + swipe */
  .cards { display: flex; flex-direction: column; gap: 12px; }
  .card {
    position: relative; border: 1px solid var(--border); border-radius: 18px; box-shadow: var(--shadow);
    overflow: hidden; transition: border-color .2s; }
  .swipe-action {
    position: absolute; top: 0; bottom: 0; width: 88px; display: flex; align-items: center; justify-content: center;
    color: #fff; z-index: 1; }
  .swipe-action svg { width: 22px; height: 22px; }
  .swipe-action.left { left: 0; background: var(--accent); }
  .swipe-action.right { right: 0; background: var(--over); }
  .card-surface {
    position: relative; z-index: 2; background: var(--surface); transform: translateX(0);
    transition: transform .28s cubic-bezier(.32,.72,0,1); touch-action: pan-y; }
  .card-surface.dragging { transition: none; }

  .card-main { display: flex; align-items: center; gap: 14px; padding: 16px; cursor: pointer; }
  .emoji { width: 46px; height: 46px; flex: 0 0 46px; border-radius: 13px; background: var(--surface-2);
    display: grid; place-items: center; font-size: 23px; line-height: 1; }
  .card-body { flex: 1; min-width: 0; }
  .card-name { font-size: 15.5px; font-weight: 600; letter-spacing: -.01em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-meta { display: flex; align-items: center; gap: 7px; margin-top: 3px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex: 0 0 8px; }
  .ago { font-size: 13px; color: var(--text-2); font-weight: 500; }
  .track { height: 5px; border-radius: 999px; background: var(--surface-2); margin-top: 10px; overflow: hidden; }
  .track-fill { height: 100%; border-radius: 999px; width: 0; transition: width .5s ease; }
  .interval-label { font-size: 11.5px; color: var(--text-3); margin-top: 5px; font-weight: 500; }
  .done-btn {
    flex: 0 0 auto; border: none; background: var(--accent); color: #fff; font-family: var(--font);
    font-size: 13.5px; font-weight: 600; padding: 10px 16px; border-radius: 11px; cursor: pointer;
    transition: transform .12s, background .15s; }
  .done-btn:active { transform: scale(.93); background: var(--accent-press); }

  .detail { max-height: 0; overflow: hidden; transition: max-height .3s ease; border-top: 0 solid var(--border); }
  .card[data-open="true"] .detail { max-height: 460px; border-top-width: 1px; }
  .detail-inner { padding: 14px 16px 16px; }
  .stat-row { display: flex; gap: 10px; margin-bottom: 14px; }
  .stat { flex: 1; background: var(--surface-2); border-radius: 12px; padding: 10px 12px; }
  .stat .k { font-size: 11px; color: var(--text-3); font-weight: 600; text-transform: uppercase; letter-spacing: .04em; }
  .stat .v { font-size: 16px; font-weight: 700; margin-top: 3px; letter-spacing: -.01em; }
  .hist-title { font-size: 11px; color: var(--text-3); font-weight: 600; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 8px; }
  .hist-item { display: flex; justify-content: space-between; font-size: 13px; padding: 6px 0; border-bottom: 1px solid var(--border); color: var(--text-2); }
  .hist-item:last-child { border-bottom: none; }
  .hint { font-size: 11.5px; color: var(--text-3); margin-top: 12px; text-align: center; }
  .detail-actions { display: flex; gap: 8px; margin-top: 14px; }
  :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 8px; }
  .card-main:focus-visible { outline-offset: -2px; }

  .empty { text-align: center; padding: 60px 24px; }
  .empty .ill { font-size: 44px; margin-bottom: 14px; }
  .empty h2 { font-size: 18px; font-weight: 700; letter-spacing: -.02em; margin-bottom: 6px; }
  .empty p { font-size: 14px; color: var(--text-2); max-width: 280px; margin: 0 auto; }

  /* Floating actions */
  .fab-wrap { position: fixed; left: 0; right: 0; bottom: calc(env(safe-area-inset-bottom) + 22px);
    display: flex; justify-content: center; gap: 14px; z-index: 50; pointer-events: none; }
  .fab { width: 56px; height: 56px; border-radius: 999px; background: var(--accent); color: #fff;
    border: none; cursor: pointer; font-family: var(--font); font-size: 24px; display: grid; place-items: center;
    box-shadow: var(--shadow-lg); transition: transform .12s, background .15s; pointer-events: all; }
  .fab:active { transform: scale(.88); }
  .fab.secondary { background: var(--surface-2); color: var(--text); }

  @media (max-width: 480px) { .detail-inner { padding: 12px 14px 14px; } }
  @media (pointer:coarse) { .icon-btn { width:44px; height:44px; } }
</style>
</head>
<body>
<header>
  <div class="header-row">
    <div class="title">
      <h1>When did I last…?</h1>
      <span>Habit tracker</span>
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="themeBtn" title="Toggle theme"></button>
      <button class="icon-btn" id="micBtn" title="Voice log">🎤</button>
      <button class="icon-btn" id="settingsBtn" title="Settings">⚙️</button>
    </div>
  </div>
</header>

<main>
  <div class="filters" id="filters"></div>
  <div class="cards" id="cards"></div>
  <div class="empty" id="empty" style="display:none">
    <div class="ill">📭</div>
    <h2>No activities yet</h2>
    <p>Tap the plus button to add your first habit to track.</p>
  </div>
</main>

<div class="fab-wrap">
  <button class="fab" id="addBtn" title="Add activity">+</button>
</div>

<!-- Settings sheet -->
<div class="sheet" id="settingsSheet">
  <div class="sheet-header">Settings</div>
  <div class="sheet-body">
    <div class="settings-section">
      <div class="settings-title">Theme</div>
      <div class="settings-seg" id="themeSeg">
        <button data-val="light">☀️ Light</button>
        <button data-val="dark">🌙 Dark</button>
        <button data-val="system">🖥️ System</button>
      </div>
    </div>
    <div class="settings-section">
      <div class="settings-title">Data</div>
      <button class="settings-btn" id="exportBtn">⬇️ Export</button>
      <button class="settings-btn" id="importBtn">⬆️ Import</button>
      <input type="file" id="importFile" accept=".json" style="display:none">
      <button class="settings-btn danger" id="deleteAllBtn">🗑️ Delete All</button>
    </div>
  </div>
</div>

<div id="deleteDefault" class="sheet" style="display:none">
  <div class="sheet-header">Delete all data?</div>
  <div class="sheet-body">
    <p style="margin-bottom:16px;font-size:14px;color:var(--text-2)">This will erase all activities and history. A backup file will be saved first.</p>
    <div style="display:flex;gap:8px">
      <button class="settings-btn" id="cancelDeleteBtn" style="flex:1">Cancel</button>
      <button class="settings-btn danger" id="confirmDeleteBtn" style="flex:1">Delete</button>
    </div>
  </div>
</div>

<div id="deleteConfirm" class="sheet" style="display:none">
  <div class="sheet-header">Deleted</div>
  <div class="sheet-body" style="text-align:center;padding:40px 20px">
    <div style="font-size:40px;margin-bottom:12px">✓</div>
    <p style="font-size:14px;color:var(--text-2)">All data removed</p>
  </div>
</div>

<!-- Add/edit sheet -->
<div class="sheet" id="addSheet">
  <div class="sheet-header">
    <span id="addTitle">Add activity</span>
    <button class="close-btn" id="closeAddBtn">✕</button>
  </div>
  <div class="sheet-body">
    <input type="text" id="addName" placeholder="Activity name" maxlength="50">
    <input type="text" id="addEmoji" placeholder="Emoji" maxlength="2" value="📝">
    <div class="interval-group">
      <label>Target interval</label>
      <select id="addInterval">
        <option value="1h">Every hour</option>
        <option value="3h">Every 3 hours</option>
        <option value="6h">Every 6 hours</option>
        <option value="12h">Every 12 hours</option>
        <option value="1d" selected>Every day</option>
        <option value="2d">Every 2 days</option>
        <option value="3d">Every 3 days</option>
        <option value="1w">Every week</option>
        <option value="2w">Every 2 weeks</option>
      </select>
    </div>
    <button class="primary-btn" id="saveBtn">Save</button>
  </div>
</div>

<!-- Voice sheet -->
<div class="sheet" id="voiceSheet">
  <div class="sheet-header">
    Voice Log
    <button class="close-btn" id="closeVoiceBtn">✕</button>
  </div>
  <div class="sheet-body" style="text-align:center;padding:40px 20px">
    <button class="fab" id="voiceMicBig">🎤</button>
    <div id="heard" style="margin-top:24px;font-size:14px;color:var(--text-2);min-height:20px"></div>
    <div id="voiceResult" style="margin-top:12px"></div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
const KEY = 'wdil-items', THEME_KEY = 'wdil-theme';
const DEFAULT_CATS = ['Health','Work','Personal','Other'];
let items = [], categories = DEFAULT_CATS.slice(), activeFilter = 'All', undoStack = null;

/* Load */
try { const stored = localStorage.getItem(KEY); if (stored) { const parsed = JSON.parse(stored); items = Array.isArray(parsed.items) ? parsed.items : parsed; categories = parsed.categories || DEFAULT_CATS.slice(); } } catch(e){}

/* Save */
function save() { try { localStorage.setItem(KEY, JSON.stringify({items,categories})); } catch(e){ toast('Storage full'); } }
function sanitizeItems(arr) { return arr.filter(i=>i && typeof i.name==='string').map(i=>({ ...i, history: Array.isArray(i.history) ? i.history.filter(t=>typeof t==='number') : [] })); }
function deriveCats(itms) { const cats = new Set(itms.map(i=>i.category).filter(Boolean)); return cats.size ? Array.from(cats) : DEFAULT_CATS.slice(); }

/* Render */
function msToAgo(ms) {
  const s = (Date.now()-ms)/1000;
  if (s < 60) return 'just now';
  if (s < 3600) return Math.floor(s/60) + 'm ago';
  if (s < 86400) return Math.floor(s/3600) + 'h ago';
  if (s < 604800) return Math.floor(s/86400) + 'd ago';
  return Math.floor(s/604800) + 'w ago';
}
function timeStrToMs(str) { const m = {h:3600000,d:86400000,w:604800000}; const match = str.match(/(\d+)([hdw])/); return match ? parseInt(match[1])*m[match[2]] : 3600000; }
function esc(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
function render() {
  const cardHTML = item => {
    const lastMs = item.history.length ? item.history[item.history.length-1] : null;
    const dueMs = lastMs + timeStrToMs(item.interval);
    const overdue = lastMs && Date.now() > dueMs;
    const daysLeft = lastMs ? Math.max(0, Math.floor((dueMs - Date.now()) / 86400000)) : null;
    const status = !lastMs ? 'fresh' : overdue ? 'over' : 'due';
    const statusDot = {fresh:'#15B79E', due:'#F59E0B', over:'#DF1B41'}[status];
    const fillPct = lastMs ? Math.min(100, Math.max(0, 100 * (Date.now()-lastMs) / (dueMs-lastMs))) : 0;
    return `<div class="card" data-id="${item.id}" data-open="false">
      <div class="swipe-action left">✏️</div>
      <div class="swipe-action right">🗑️</div>
      <div class="card-surface">
        <div class="card-main">
          <div class="emoji">${item.emoji}</div>
          <div class="card-body">
            <div class="card-name">${esc(item.name)}</div>
            <div class="card-meta">
              <div class="dot" style="background:${statusDot}"></div>
              <div class="ago">${lastMs ? msToAgo(lastMs) : 'Never'}</div>
            </div>
            <div class="track"><div class="track-fill" style="width:${fillPct}%"></div></div>
            <div class="interval-label">${item.interval}</div>
          </div>
          <button class="done-btn">Log</button>
        </div>
        <div class="detail">
          <div class="detail-inner">
            <div class="stat-row">
              <div class="stat"><div class="k">Total Logs</div><div class="v tnum">${item.history.length}</div></div>
              <div class="stat"><div class="k">Last</div><div class="v">${lastMs ? msToAgo(lastMs) : '–'}</div></div>
              <div class="stat"><div class="k">Streak</div><div class="v tnum">${item.history.length}d</div></div>
            </div>
            ${item.history.length ? `<div class="hist-title">Recent</div><div>${item.history.slice(-5).reverse().map(t=>`<div class="hist-item"><span>${new Date(t).toLocaleDateString()}</span><span>${new Date(t).toLocaleTimeString()}</span></div>`).join('')}</div>` : '<div class="hint">No history yet</div>'}
            <div class="detail-actions">
              <button class="edit-btn" style="flex:1;padding:10px;border:1px solid var(--border);background:var(--surface-2);border-radius:11px;cursor:pointer;font-family:var(--font);font-size:13px;font-weight:600">Edit</button>
              <button class="delete-btn" style="flex:1;padding:10px;border:1px solid var(--border);background:var(--surface-2);border-radius:11px;cursor:pointer;font-family:var(--font);font-size:13px;font-weight:600;color:var(--over)">Delete</button>
            </div>
          </div>
        </div>
      </div>
    </div>`;
  };
  const filtered = activeFilter === 'All' ? items : items.filter(i=>i.category === activeFilter);
  const grouped = {};
  filtered.forEach(i=>{ const c = i.category || 'Other'; if(!grouped[c]) grouped[c]=[]; grouped[c].push(i); });
  const groupHTML = Object.entries(grouped).map(([cat,itms])=>
    `<div style="margin-bottom:28px">
      <div style="font-size:11px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:10px;padding:0 4px">${esc(cat)}</div>
      <div class="cards">${itms.map(cardHTML).join('')}</div>
    </div>`
  ).join('');
  document.getElementById('cards').innerHTML = groupHTML;
  document.getElementById('empty').style.display = filtered.length ? 'none' : '';
  renderFilters();
  attachCardListeners();
}
function renderFilters() {
  const cats = ['All', ...categories];
  document.getElementById('filters').innerHTML = cats.map(c=>`<button class="pill" data-active="${c===activeFilter}" data-cat="${c}">${esc(c)}</button>`).join('');
  document.getElementById('filters').addEventListener('click', e=>{ const btn=e.target.closest('.pill'); if(btn) { activeFilter=btn.dataset.cat; render(); } });
}
function renderGroups() { /* Optional */ }

/* Undo */
function update(fn) { undoStack={items:JSON.parse(JSON.stringify(items)),categories:categories.slice()}; fn(); save(); render(); }

/* Card interactions */
function attachCardListeners() {
  document.querySelectorAll('.card').forEach(card=>{
    const id = card.dataset.id;
    const item = items.find(i=>i.id===id);
    if (!item) return;
    const surface = card.querySelector('.card-surface');
    let touchX = 0, touchY = 0;
    surface.addEventListener('touchstart', e=>{ touchX=e.touches[0].clientX; touchY=e.touches[0].clientY; card.classList.remove('dragging'); }, {passive:true});
    surface.addEventListener('touchmove', e=>{ const dx=e.touches[0].clientX-touchX; const dy=Math.abs(e.touches[0].clientY-touchY); if(dy<20) surface.style.transform=`translateX(${Math.max(-88,Math.min(88,dx))}px)`; }, {passive:true});
    surface.addEventListener('touchend', e=>{ const dx=parseInt(surface.style.transform.match(/[\d-]+/)?.[0]||0); surface.style.transform=''; setTimeout(()=>surface.classList.remove('dragging'),0); if(Math.abs(dx)>44) { if(dx>0) openEdit(item); else deleteItem(item); } });
    card.querySelector('.card-main').addEventListener('click', ()=>{ card.dataset.open=(card.dataset.open==='false'?'true':'false'); });
    card.querySelector('.done-btn').addEventListener('click', e=>{ e.stopPropagation(); update(()=>{ item.history.push(Date.now()); }); });
    card.querySelector('.edit-btn')?.addEventListener('click', e=>{ e.stopPropagation(); openEdit(item); });
    card.querySelector('.delete-btn')?.addEventListener('click', e=>{ e.stopPropagation(); deleteItem(item); });
  });
}

/* Add/Edit */
const addSheet = document.getElementById('addSheet'), addName = document.getElementById('addName'), addEmoji = document.getElementById('addEmoji'), addInterval = document.getElementById('addInterval'), saveBtn = document.getElementById('saveBtn');
let editingId = null;
function openAdd(preset='') { editingId=null; addName.value=preset; addEmoji.value='📝'; addInterval.value='1d'; document.getElementById('addTitle').textContent='Add activity'; openSheet(addSheet); }
function openEdit(item) { editingId=item.id; addName.value=item.name; addEmoji.value=item.emoji; addInterval.value=item.interval; document.getElementById('addTitle').textContent='Edit activity'; openSheet(addSheet); }
saveBtn.addEventListener('click', ()=>{
  const name = addName.value.trim(), emoji = addEmoji.value.trim() || '📝', interval = addInterval.value;
  if (!name) return alert('Name required');
  if (editingId) {
    update(()=>{ const item = items.find(i=>i.id===editingId); if(item) { item.name=name; item.emoji=emoji; item.interval=interval; } });
  } else {
    update(()=>{ items.push({ id: Date.now().toString(), name, emoji, interval, category: 'Personal', history: [] }); categories = deriveCats(items); });
  }
  closeSheets();
});

/* Delete item */
function deleteItem(item) { if (confirm(`Remove "${item.name}"?`)) { update(()=>{ items = items.filter(i=>i.id!==item.id); }); } }

/* Sheets */
function openSheet(sheet) { sheet.style.display=''; document.body.style.overflow='hidden'; }
function closeSheets() { document.querySelectorAll('.sheet').forEach(s=>s.style.display='none'); document.body.style.overflow=''; addName.value=''; addEmoji.value=''; }
document.getElementById('closeAddBtn').addEventListener('click', closeSheets);
document.getElementById('closeVoiceBtn').addEventListener('click', closeSheets);
document.getElementById('settingsBtn').addEventListener('click', ()=>openSheet(document.getElementById('settingsSheet')));
document.querySelectorAll('.sheet').forEach(s=>s.addEventListener('click', e=>{ if(e.target===s) closeSheets(); }));

/* Toast */
function toast(msg) { const t=document.getElementById('toast'); t.textContent=msg; t.style.display=''; setTimeout(()=>t.style.display='none', 2500); }

/* Import/Export */
document.getElementById('exportBtn').addEventListener('click', ()=>{
  if (!downloadBackup('when-did-i-last')) toast("Couldn't export");
  else toast('Exported your data');
});
document.getElementById('importBtn').addEventListener('click', ()=>document.getElementById('importFile').click());
function downloadBackup(name) {
  try { const data=JSON.stringify({items,categories}); const blob=new Blob([data]); const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download=name+'.json'; a.click(); URL.revokeObjectURL(url); return true; } catch(e){ return false; }
}
document.getElementById('importFile').addEventListener('change', e=>{
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const data = JSON.parse(reader.result);
      const imported = Array.isArray(data) ? data : data.items;
      if (!Array.isArray(imported)) throw new Error('bad');
      items = sanitizeItems(imported);
      if (!Array.isArray(data) && Array.isArray(data.categories) && data.categories.length) categories = data.categories;
      else categories = deriveCats(items);
      save(); renderGroups(); render(); closeSheets(); toast('Imported successfully');
    } catch (err) { toast("Couldn't read that file"); }
  };
  reader.readAsText(file); e.target.value = '';
});

/* Delete all data (two-step confirm) */
const deleteDefault = document.getElementById('deleteDefault');
const deleteConfirm = document.getElementById('deleteConfirm');
function resetDeleteConfirm(){ deleteDefault.style.display=''; deleteConfirm.style.display='none'; }
document.getElementById('deleteAllBtn').addEventListener('click', ()=>{ deleteDefault.style.display='none'; deleteConfirm.style.display=''; });
document.getElementById('cancelDeleteBtn').addEventListener('click', resetDeleteConfirm);
document.getElementById('confirmDeleteBtn').addEventListener('click', ()=>{
  const hadData = items.length > 0;
  if (hadData) downloadBackup('when-did-i-last-backup');
  try { localStorage.removeItem(KEY); } catch(e){}
  activeFilter = 'All'; undoStack = null;
  update(()=>{ items = []; categories = DEFAULT_CATS.slice(); });
  renderGroups(); resetDeleteConfirm(); closeSheets();
  toast(hadData ? 'Backup saved · all data deleted' : 'All data deleted');
});

/* Theme */
const themeBtn = document.getElementById('themeBtn');
const themeSeg = document.getElementById('themeSeg');
const sysMedia = window.matchMedia('(prefers-color-scheme: dark)');
let themePref = localStorage.getItem(THEME_KEY) || 'system';
const ICONS = {
  light: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4.5"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>',
  dark: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>',
  system: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>'
};
function applyTheme() {
  const resolved = themePref==='system' ? (sysMedia.matches?'dark':'light') : themePref;
  document.documentElement.dataset.theme = resolved;
  document.querySelector('meta[name=theme-color]').setAttribute('content', resolved==='dark' ? '#0B0D14' : '#635BFF');
  themeBtn.innerHTML = ICONS[themePref];
}
function setTheme(pref) { themePref = pref; localStorage.setItem(THEME_KEY, pref); applyTheme(); syncThemeSeg(); }
function syncThemeSeg() { themeSeg.querySelectorAll('button').forEach(b=>b.dataset.active = (b.dataset.val===themePref)); }
themeBtn.addEventListener('click', ()=>{ const order=['light','dark','system']; setTheme(order[(order.indexOf(themePref)+1)%3]); });
themeSeg.addEventListener('click', e=>{ const b=e.target.closest('button'); if(b) setTheme(b.dataset.val); });
sysMedia.addEventListener('change', ()=>{ if(themePref==='system') applyTheme(); });
applyTheme();

/* Voice */
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
const micBtn = document.getElementById('micBtn');
const voiceMicBig = document.getElementById('voiceMicBig');
const heard = document.getElementById('heard');
const voiceResult = document.getElementById('voiceResult');
let recog = null, listening = false;

if (!SR) { micBtn.style.display = 'none'; }
else {
  micBtn.addEventListener('click', ()=>openVoice());
  voiceMicBig.addEventListener('click', ()=>{ listening ? stopListening() : startListening(); });
}
function openVoice() { heard.textContent=''; voiceResult.innerHTML=''; openSheet(document.getElementById('voiceSheet')); setTimeout(startListening, 350); }
function startListening() {
  if (!SR || listening) return;
  recog = new SR(); recog.lang = navigator.language || 'en-US'; recog.interimResults = true; recog.maxAlternatives = 1;
  listening = true; micBtn.classList.add('listening'); voiceMicBig.classList.add('listening'); heard.textContent='Listening…';
  recog.onresult = e => {
    const txt = Array.from(e.results).map(r=>r[0].transcript).join('').trim();
    heard.innerHTML = `"<b>${esc(txt)}</b>"`;
    if (e.results[e.results.length-1].isFinal) handleTranscript(txt);
  };
  recog.onerror = ev => { heard.textContent = ev.error==='not-allowed' ? 'Microphone permission was blocked.' : "Didn't catch that — tap the mic to retry."; stopListening(); };
  recog.onend = () => { listening=false; micBtn.classList.remove('listening'); voiceMicBig.classList.remove('listening'); };
  try { recog.start(); } catch(e){}
}
function stopListening() { if (recog){ try{recog.stop();}catch(e){} } listening=false; micBtn.classList.remove('listening'); voiceMicBig.classList.remove('listening'); }
const FILLER = new Set(['i','just','did','the','a','an','my','some','today','now','have','to','done','finished','again','and','of','out']);
function stem(w){
  if (w.length <= 3) return w;
  if (w.endsWith('ing') && w.length > 5) return w.slice(0, -3);
  if (w.endsWith('ed')  && w.length > 4) return w.slice(0, -2);
  if (w.endsWith('es')  && w.length > 4) return w.slice(0, -2);
  if (w.endsWith('s')   && !w.endsWith('ss') && w.length > 3) return w.slice(0, -1);
  return w;
}
function tokens(s){
  return s.toLowerCase().replace(/[^a-z0-9 ]/g,' ').split(/\s+/)
    .filter(t => t && !FILLER.has(t)).map(stem);
}
function dice(a, b){
  if (a === b) return 1;
  if (a.length < 2 || b.length < 2) return 0;
  const bg = s => { const m = new Map(); for (let i=0;i<s.length-1;i++){ const g=s.slice(i,i+2); m.set(g,(m.get(g)||0)+1); } return m; };
  const A = bg(a), B = bg(b); let inter = 0;
  A.forEach((c,g)=>{ if (B.has(g)) inter += Math.min(c, B.get(g)); });
  return (2*inter) / ((a.length-1) + (b.length-1));
}
function scoreMatch(query, name){
  const qt = tokens(query), nt = tokens(name);
  if (!qt.length || !nt.length) return 0;
  const qs = qt.join(' '), ns = nt.join(' ');
  if (qs === ns || ns.includes(qs) || qs.includes(ns)) return 0.95;
  const nset = new Set(nt);
  let hits = 0; qt.forEach(t=>{ if (nset.has(t)) hits++; });
  const tokenScore = hits / Math.max(qt.length, nt.length);
  return Math.max(tokenScore, dice(qs, ns));
}
function handleTranscript(txt) {
  stopListening();
  let best=null, bestScore=0;
  items.forEach(it=>{ const s=scoreMatch(txt, it.name); if(s>bestScore){ bestScore=s; best=it; } });
  if (best && bestScore>=0.5) {
    update(()=>{ best.history.push(Date.now()); });
    voiceResult.innerHTML = `<div style="text-align:center;margin-top:18px"><div style="font-size:30px">${best.emoji}</div>
      <div style="font-weight:700;margin-top:6px;font-size:16px">Logged "${esc(best.name)}"</div>
      <div style="color:var(--text-2);font-size:13px;margin-top:4px">just now</div></div>`;
    setTimeout(closeSheets, 1400);
  } else {
    const guess = txt.trim();
    voiceResult.innerHTML = `<div style="text-align:center;margin-top:18px">
      <div style="color:var(--text-2);font-size:14px;margin-bottom:14px">No match for that yet.</div>
      <button class="primary-btn" style="margin-top:0" id="voiceCreate">Add "${esc(guess)}" as new</button></div>`;
    document.getElementById('voiceCreate').addEventListener('click', ()=>{ closeSheets(); openAdd(guess); });
  }
}

/* Init */
render();
</script>
